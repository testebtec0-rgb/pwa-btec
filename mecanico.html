<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTEC - Painel da Oficina</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .card-maquina { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 15px; margin-bottom: 12px; border: 1px solid var(--borda-glass); }
        .status-badge { display: inline-block; padding: 4px 8px; font-size: 10px; font-weight: bold; border-radius: 4px; margin-top: 5px; text-transform: uppercase; }
        .status-liberado { background: rgba(0,230,118,0.2); color: #00e676; }
        .status-bloqueado { background: rgba(255,74,74,0.2); color: #ff4a4a; }
        .btn-acao { background: #3b82f6; color: white; border: none; padding: 8px 12px; border-radius: 6px; font-size: 11px; cursor: pointer; margin-right: 5px; font-weight: bold; }
        .btn-bloquear { background: #ff4a4a; }
    </style>
</head>
<body>
    <div class="container-app" style="max-width: 600px;">
        <header class="header-logo">
            <img src="images.png" alt="BTEC" class="logo-btec">
            <h2 style="font-size: 16px; margin-top: 10px; color: var(--cor-subtext)">🔧 PAINEL DE MANUTENÇÃO DA FROTA</h2>
        </header>

        <div id="lista-equipamentos">Carregando frota BTEC...</div>
    </div>

    <script>
        const GOOGLE_SCRIPT_URL = "COLE_AQUI_SUA_URL_DO_APPS_SCRIPT";

        async function carregarOficina() {
            const container = document.getElementById("lista-equipamentos");
            try {
                const res = await fetch(`${GOOGLE_SCRIPT_URL}?acao=listar_frota`);
                const maquinas = await res.json();
                container.innerHTML = "";

                maquinas.forEach(m => {
                    const card = document.createElement("div");
                    card.className = "card-maquina";
                    card.innerHTML = `
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <div>
                                <strong>${m.prefixo}</strong> - <span style="color:var(--cor-subtext); font-size:12px;">${m.familia}</span><br>
                                <span class="status-badge ${m.status === 'BLOQUEADO' ? 'status-bloqueado' : 'status-liberado'}">${m.status}</span>
                                <p style="font-size:11px; color:var(--cor-subtext); margin-top:5px;">${m.observacao ? 'Obs: ' + m.observacao : ''}</p>
                            </div>
                            <div>
                                <button class="btn-acao" onclick="mudarStatus('${m.prefixo}', 'LIBERADO')">LIBERAR</button>
                                <button class="btn-acao btn-bloquear" onclick="mudarStatus('${m.prefixo}', 'BLOQUEADO')">BLOQUEAR</button>
                            </div>
                        </div>
                    `;
                    container.appendChild(card);
                });
            } catch (e) {
                container.innerHTML = "❌ Erro ao conectar com o servidor da oficina.";
            }
        }

        async function mudarStatus(prefixo, novoStatus) {
            const nomeMecanico = prompt("Digite seu nome (Mecânico):");
            if (!nomeMecanico) return;
            const obs = prompt(`Motivo/Observação para deixar como ${novoStatus}:`);

            const payload = {
                tipo_envio: "mecanico",
                prefixo: prefixo,
                status: novoStatus,
                mecanico: nomeMecanico,
                observacao: obs || ""
            };

            try {
                await fetch(GOOGLE_SCRIPT_URL, {
                    method: "POST",
                    mode: "no-cors",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });
                alert(`Equipamento ${prefixo} definido como ${novoStatus}!`);
                carregarOficina();
            } catch (e) {
                alert("Erro ao salvar alteração.");
            }
        }

        document.addEventListener("DOMContentLoaded", carregarOficina);
    </script>
</body>
</html>
